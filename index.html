<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LANCERO OS — Terminal de Acceso Táctico</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>

  <div class="vignette"></div>

  <canvas id="radarCanvas"></canvas>

  <!-- Brackets perimetrales del HUD -->
  <div class="bracket b-tl"></div>
  <div class="bracket b-tr"></div>
  <div class="bracket b-bl"></div>
  <div class="bracket b-br"></div>

  <div class="hud-frame"></div>

  <!-- Etiquetas HUD -->
  <div class="hud-label hl-tl">// LANCERO-OS v2.4</div>
  <div class="hud-label hl-tc">• SECURE CHANNEL</div>
  <div class="hud-label hl-tr" id="utc-clock">00:00:00 UTC</div>
  <div class="hud-label hl-bl">LAT 84°00'N — LON 72°59'W</div>
  <div class="hud-label hl-bc">ENCR: AES-256</div>
  <div class="hud-label hl-br">UNIT: LANCEROOS</div>

  <!-- Login Box -->
  <div class="login-box">
    <div class="box-bracket bb-tl"></div>
    <div class="box-bracket bb-tr"></div>
    <div class="box-bracket bb-bl"></div>
    <div class="box-bracket bb-br"></div>

    <!-- Emblema SVG -->
    <div class="emblem-container">
      <svg class="emblem" viewBox="-20 -20 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="34" stroke="#ff9800" stroke-width="1.2" opacity="0.4"/>
        <circle cx="50" cy="50" r="30" stroke="#ff9800" stroke-width="1.8"/>
        <path d="M26 50 C26 65, 34 74, 50 74 C66 74, 74 65, 74 50" stroke="#ff9800" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
        <path d="M50 22 L54 34 L64 38 L55 44 L57 56 L50 49 L43 56 L45 44 L36 38 L46 34 Z"
              fill="#ff9800" fill-opacity="0.2" stroke="#ff9800" stroke-width="1.2"/>
        <path d="M50 25 L50 64 M38 46 L62 46" stroke="#ff9800" stroke-width="0.8" opacity="0.4"/>
        <path d="M38 40 Q28 42 34 52 Q44 48 46 44" stroke="#ff9800" stroke-width="1"/>
        <path d="M62 40 Q72 42 66 52 Q56 48 54 44" stroke="#ff9800" stroke-width="1"/>
        <g class="animated-sparkle-ring">
          <circle cx="50" cy="50" r="49" stroke="rgba(255,152,0,0.3)" stroke-width="1" stroke-dasharray="4 4"/>
          <path d="M50 -5 L53.5 -1 L50 3 L46.5 -1 Z" fill="#ffffff" filter="drop-shadow(0 0 5px #ffffff)"/>
        </g>
      </svg>
    </div>

    <h1 class="system-title">LANCERO OS</h1>
    <p class="system-subtitle">Tactical Evolution System</p>

    <div class="divider"></div>

    <div class="tabs">
      <div class="tab active">Iniciar Sesión</div>
      <div class="tab inactive">Registro</div>
    </div>

    <form onsubmit="event.preventDefault();">
      <div class="input-group">
        <div class="input-icon"></div>
        <input type="text" class="input-field" placeholder="USUARIO" autocomplete="off">
      </div>
      <div class="input-group">
        <div class="input-icon"></div>
        <input type="password" class="input-field" placeholder="CONTRASEÑA">
      </div>
      <button type="submit" class="btn-submit">Acceder al Sistema</button>
    </form>
  </div>

  <script src="Radar.js"></script>
</body>
</html>
